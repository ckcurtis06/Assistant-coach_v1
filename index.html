
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:40px; text-align:center; }
    button { padding:30px; font-size:1.8em; margin:20px; width:90%; border-radius:12px; background:#22c55e; color:black; }
  </style>
</head>
<body>
  <h1>Test Version</h1>
  <button onclick="test1()">1. Click Me - New Team</button>
  <button onclick="test2()">2. Click Me - Import</button>

  <div id="output" style="margin-top:40px; font-size:1.4em;"></div>

  <script>
    console.log("✅ JavaScript is running");

    function test1() {
      alert("✅ New Team button works!");
      document.getElementById("output").innerHTML += "<p>New Team button clicked!</p>";
    }

    function test2() {
      alert("✅ Import button works!");
      document.getElementById("output").innerHTML += "<p>Import button clicked!</p>";
    }
  </script>
</body>
</html>
