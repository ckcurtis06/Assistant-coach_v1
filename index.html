<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Assistant Coach">
  <meta name="theme-color" content="#22c55e">
 
  <link rel="manifest" href="data:application/manifest+json,{
    &quot;name&quot;:&quot;Assistant Coach ⚾&quot;,
    &quot;short_name&quot;:&quot;Asst Coach&quot;,
    &quot;start_url&quot;:&quot;.&quot;,
    &quot;display&quot;:&quot;standalone&quot;,
    &quot;background_color&quot;:&quot;#0f172a&quot;,
    &quot;theme_color&quot;:&quot;#22c55e&quot;,
    &quot;icons&quot;:[{
      &quot;src&quot;:&quot;https://raw.githubusercontent.com/ckcurtis06/Assistant-coach_v1/main/icon-512.png&quot;,
      &quot;sizes&quot;:&quot;512x512&quot;,
      &quot;type&quot;:&quot;image/png&quot;,
      &quot;purpose&quot;:&quot;any maskable&quot;
    }]
  }">

  <title>Assistant Coach ⚾ </title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5/dist/tesseract.min.js"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin:0; background:#0f172a; color:white; }
    .container { padding:20px; max-width:1400px; margin:auto; }
    button, select { padding:18px 24px; margin:8px 0; font-size:1.2em; min-height:65px; border-radius:16px; width:100%; }
    .player-card { background:#334155; border-radius:16px; padding:20px; margin:12px 0; cursor:pointer; display:flex; align-items:center; gap:20px; }
    .number { font-size:3em; font-weight:bold; color:#22c55e; min-width:90px; text-align:center; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; overflow:auto; }
    .modal-content { background:#1e2937; margin:20px auto; padding:25px; max-width:1100px; border-radius:16px; }
    .close { float:right; font-size:3em; cursor:pointer; color:#ef4444; }
    .charts { display:flex; gap:30px; flex-wrap:wrap; justify-content:center; }
    .chart-container { width:100%; max-width:460px; text-align:center; }
    
    .tabs { display:flex; gap:10px; margin:15px 0; flex-wrap:wrap; }
    .tab { flex:1; min-width:140px; padding:18px; text-align:center; font-size:1.2em; background:#334155; border-radius:12px; cursor:pointer; }
    .tab.active { background:#22c55e; color:black; font-weight:bold; }

    table { width:100%; border-collapse:collapse; background:#1e2937; border-radius:12px; overflow:hidden; margin-top:10px; }
    th, td { padding:12px 8px; text-align:center; border-bottom:1px solid #334155; vertical-align:top; }
    th { background:#334155; cursor:pointer; user-select:none; }
    th:hover { background:#475569; }
    th.sort-asc::after { content:" ▲"; font-size:0.75em; }
    th.sort-desc::after { content:" ▼"; font-size:0.75em; }
    tr:hover { background:#334155; }

    .lineup-game { background:#1e2937; padding:15px; margin:10px 0; border-radius:12px; }
    .ocr-result { background:#334155; padding:10px; border-radius:8px; white-space:pre-wrap; font-size:0.95em; margin:8px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Assistant Coach ⚾</h1>

    <!-- Auth Bar -->
    <div id="authBar" style="background:#1e2937;padding:16px 20px;border-radius:16px;margin:15px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
      <span id="authStatus" style="font-size:1.1em;color:#94a3b8;">Not signed in — viewing read-only</span>
      <div style="display:flex;gap:10px;">
        <button id="signInBtn" onclick="signIn()" style="background:#4285f4;width:auto;padding:12px 20px;min-height:unset;font-size:1em;">🔐 Sign in with Google</button>
        <button id="signOutBtn" onclick="signOut()" style="background:#475569;width:auto;padding:12px 20px;min-height:unset;font-size:1em;display:none;">Sign Out</button>
      </div>
    </div>

    <!-- Edit-only sections (hidden for viewers) -->
    <div id="editControls" style="display:none;">

    <!-- Backup & Restore -->
    <div style="background:#1e2937;padding:20px;border-radius:16px;margin:15px 0;">
      <h2>Backup & Restore</h2>
      <button onclick="copyBackupToClipboard()" style="background:#eab308;color:black;">📋 COPY BACKUP TO CLIPBOARD</button>
      <button onclick="downloadBackup()">⬇️ Download Backup</button>
      <button onclick="document.getElementById('restoreInput').click()" style="background:#22c55e;color:black;">⬆️ Restore from Backup</button>
      <input type="file" id="restoreInput" accept=".json" style="display:none" onchange="restoreBackup(event)">
    </div>

    <!-- Team Management -->
    <div style="background:#1e2937;padding:20px;border-radius:16px;margin:15px 0;">
      <select id="teamSelect" onchange="switchTeam()"></select>
      <button onclick="createNewTeam()">+ New Team</button>
      <button onclick="removeCurrentTeam()">🗑️ Remove Team</button>
    </div>

    <!-- Import -->
    <div style="background:#1e2937;padding:20px;border-radius:16px;margin:15px 0;">
      <input type="file" id="csvFile" accept=".csv" style="width:100%;margin-bottom:10px;">
      <button onclick="importNewSeason()" style="background:#3b82f6;">📤 Import GameChanger CSV</button>
    </div>

    </div><!-- end editControls -->

    <div id="seasonSelector" style="display:none;background:#1e2937;padding:20px;border-radius:16px;margin:15px 0;">
      <div style="display:flex;gap:10px;align-items:center;">
        <select id="seasonSelect" onchange="switchSeason()" style="flex:1;margin:0;"></select>
        <button onclick="deleteCurrentSeason()" style="background:#ef4444;width:auto;min-width:120px;padding:18px;margin:0;white-space:nowrap;">🗑️ Delete CSV</button>
      </div>
    </div>

    <div id="summarySection" style="background:#334155;padding:18px;border-radius:12px;text-align:center;font-size:1.4em;margin:15px 0;display:none;"></div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tabCards" onclick="switchTab(0)">Player Cards</div>
      <div class="tab" id="tabTable" onclick="switchTab(1)">Team Stats Table</div>
      <div class="tab" id="tabBoxScores" onclick="switchTab(2)">Box Scores</div>
      <div class="tab" id="tabLineup" onclick="switchTab(3)">Lineup Tracker</div>
    </div>

    <div id="playerList"></div>
    <div id="teamTableContainer" style="display:none;"></div>
    <div id="boxScoresContainer" style="display:none;"></div>
    <div id="lineupTrackerContainer" style="display:none;"></div>
  </div>

  <!-- Player Modal -->
  <div id="playerModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <h1 id="modalName"></h1>
      <div id="modalBody"></div>
      <div class="charts">
        <div class="chart-container"><h3>Positions Played</h3><canvas id="posChart" height="380"></canvas></div>
        <div class="chart-container"><h3>Hitting Breakdown</h3><canvas id="hittingChart" height="380"></canvas></div>
      </div>
    </div>
  </div>

  <script>
    let allTeams = {};
    let currentTeam = "";
    let currentView = "Career";
    let players = [];
    let posChart = null;
    let hittingChart = null;
    let currentSort = { col: -1, dir: 1 };
    const STORAGE_KEY = "AssistantCoach_Full_v2";

    // BUG FIX #3: lineupGames is now keyed per team so games don't bleed across teams
    let allLineupGames = {}; // { teamName: [...games] }

    function getLineupGames() {
      if (!currentTeam) return [];
      if (!allLineupGames[currentTeam]) allLineupGames[currentTeam] = [];
      return allLineupGames[currentTeam];
    }

    // ==================== FIREBASE ====================
    const firebaseConfig = {
      apiKey: "AIzaSyBkXyrFwEVtfNk7tAbBOaAAxQQcOENp0Hs",
      authDomain: "assistant-coach-ecfd7.firebaseapp.com",
      projectId: "assistant-coach-ecfd7",
      storageBucket: "assistant-coach-ecfd7.firebasestorage.app",
      messagingSenderId: "144611291022",
      appId: "1:144611291022:web:792aefe5f0c17787d0fedf"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const OWNER_EMAIL = ""; // will be set automatically on first sign-in

    let currentUser = null;
    let isOwner = false;
    let ownerEmail = localStorage.getItem("ACOwnerEmail") || "";

    auth.onAuthStateChanged(async (user) => {
      currentUser = user;
      if (user) {
        // First person to sign in becomes the owner
        if (!ownerEmail) {
          ownerEmail = user.email;
          localStorage.setItem("ACOwnerEmail", ownerEmail);
          // Save owner email to Firestore so other devices know
          await db.collection("config").doc("owner").set({ email: ownerEmail });
        }
        // Check if owner email is in Firestore (for new devices)
        const ownerDoc = await db.collection("config").doc("owner").get();
        if (ownerDoc.exists) ownerEmail = ownerDoc.data().email;

        isOwner = (user.email === ownerEmail);
        document.getElementById("authStatus").textContent = isOwner
          ? `✅ Signed in as ${user.email} (Coach)`
          : `👁️ Signed in as ${user.email} (View only)`;
        document.getElementById("signInBtn").style.display = "none";
        document.getElementById("signOutBtn").style.display = "inline-block";
        document.getElementById("editControls").style.display = isOwner ? "block" : "none";
      } else {
        isOwner = false;
        document.getElementById("authStatus").textContent = "Not signed in — viewing read-only";
        document.getElementById("signInBtn").style.display = "inline-block";
        document.getElementById("signOutBtn").style.display = "none";
        document.getElementById("editControls").style.display = "none";
      }
      // Load data from Firebase (works for both owner and viewers)
      await loadFromFirebase();
    });

    function signIn() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider);
    }

    function signOut() {
      auth.signOut();
    }

    async function loadFromFirebase() {
      try {
        const doc = await db.collection("coachData").doc("main").get();
        if (doc.exists) {
          const data = doc.data();
          allTeams = data.teams || {};
          allLineupGames = data.lineupGames || {};
        } else {
          // No Firebase data yet — try migrating from localStorage
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved && isOwner) {
            const parsed = JSON.parse(saved);
            allTeams = parsed.teams || parsed;
            allLineupGames = parsed.lineupGames || {};
            await saveData(); // push localStorage data up to Firebase
          }
        }
      } catch(err) {
        // Firebase unavailable — fall back to localStorage
        console.warn("Firebase unavailable, using localStorage:", err);
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          allTeams = parsed.teams || parsed;
          allLineupGames = parsed.lineupGames || {};
        }
      }
      if (Object.keys(allTeams).length > 0 && !currentTeam) {
        currentTeam = Object.keys(allTeams)[0];
        updateSeasonSelector();
        currentView = "Career";
      }
      updateTeamSelector();
      if (currentTeam) loadCurrentView();
    }

    async function saveData() {
      if (!isOwner) return; // viewers cannot save
      // Save to Firebase
      try {
        await db.collection("coachData").doc("main").set({
          teams: allTeams,
          lineupGames: allLineupGames,
          updatedAt: new Date().toISOString()
        });
      } catch(err) {
        console.warn("Firebase save failed, saving to localStorage:", err);
      }
      // Always keep localStorage in sync as backup
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ teams: allTeams, lineupGames: allLineupGames }));
    }

    function copyBackupToClipboard() {
      if (Object.keys(allTeams).length === 0) return alert("No data yet");
      navigator.clipboard.writeText(JSON.stringify({ teams: allTeams, lineupGames: allLineupGames }, null, 2))
        .then(() => alert("✅ Backup copied!"));
    }

    function downloadBackup() {
      if (Object.keys(allTeams).length === 0) return alert("No data");
      const dataStr = JSON.stringify({ teams: allTeams, lineupGames: allLineupGames }, null, 2);
      const blob = new Blob([dataStr], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `AssistantCoach_Backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click(); URL.revokeObjectURL(url);
    }

    function restoreBackup(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const parsed = JSON.parse(e.target.result);
          allTeams = parsed.teams || parsed;
          allLineupGames = parsed.lineupGames || {};
          updateTeamSelector();
          if (Object.keys(allTeams).length > 0) {
            currentTeam = Object.keys(allTeams)[0];
            updateSeasonSelector();
            currentView = Object.keys(allTeams[currentTeam])[0] || "Career";
            loadCurrentView();
          }
          saveData();
          alert("✅ Backup restored!");
        } catch(err) { alert("❌ Invalid backup file"); }
      };
      reader.readAsText(file);
    }

    function createNewTeam() {
      const name = prompt("New team name:", "RA BLK 13U");
      if (name) { allTeams[name] = {}; currentTeam = name; updateTeamSelector(); saveData(); }
    }

    function updateTeamSelector() {
      const sel = document.getElementById("teamSelect");
      sel.innerHTML = "";
      Object.keys(allTeams).forEach(t => {
        const opt = document.createElement("option");
        opt.value = t; opt.textContent = t;
        if (t === currentTeam) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function switchTeam() {
      currentTeam = document.getElementById("teamSelect").value;
      currentView = "Career";
      // BUG FIX #5: update season selector when switching teams
      if (currentTeam) {
        updateSeasonSelector();
        loadCurrentView();
      }
    }

    function importNewSeason() {
      if (!currentTeam) return alert("Create/select a team first");
      const file = document.getElementById("csvFile").files[0];
      if (!file) return alert("Select CSV file");
      const seasonName = prompt("Season name:", "Spring 2026");
      if (!seasonName) return;

      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: (results) => {
          const seasonPlayers = results.data.map(row => {
            const first = (row["First"] || row["First name"] || "").trim();
            const last = (row["Last"] || row["Last name"] || "").trim();
            const name = first && last ? `${first} ${last}` : first || last || "";
            if (name.length < 3) return null;

            let num = "?";
            const possibleCols = ["#", "Number", "No", "Jersey", "Player #", "ID"];
            for (let col of possibleCols) {
              if (row[col] && row[col].toString().trim() !== "") {
                num = row[col].toString().trim();
                break;
              }
            }
            if (num === "?") {
              const rowStr = JSON.stringify(row);
              const found = rowStr.match(/\b\d{1,2}\b/);
              if (found) num = found[0];
            }

            return {
              number: num,
              name: name,
              // BUG FIX #6: use full name as merge key instead of just firstName
              mergeKey: name.toLowerCase(),
              firstName: first.toLowerCase(),
              gp: parseInt(row["GP"]||0), atBats: parseInt(row["AB"]||0), hits: parseInt(row["H"]||0),
              walks: parseInt(row["BB"]||0), homeRuns: parseInt(row["HR"]||0), rbis: parseInt(row["RBI"]||0),
              strikeouts: parseInt(row["SO"]||0), inningsPitched: parseFloat(row["IP"]||0),
              earnedRuns: parseInt(row["ER"]||0), battingOrder: parseInt(row["BO"]||0),
              posP: parseFloat(row["DEF_P"]||0), posC: parseFloat(row["DEF_C"]||0),
              pos1B: parseFloat(row["DEF_1B"]||0), pos2B: parseFloat(row["DEF_2B"]||0),
              pos3B: parseFloat(row["DEF_3B"]||0), posSS: parseFloat(row["DEF_SS"]||0),
              posLF: parseFloat(row["DEF_LF"]||0), posCF: parseFloat(row["DEF_CF"]||0),
              posRF: parseFloat(row["DEF_RF"]||0)
            };
          }).filter(p => p);

          if (!allTeams[currentTeam]) allTeams[currentTeam] = {};
          allTeams[currentTeam][seasonName] = seasonPlayers;
          currentView = seasonName;
          updateSeasonSelector();
          loadCurrentView();
          saveData();
          alert(`✅ Imported ${seasonPlayers.length} players`);
        }
      });
    }

    function updateSeasonSelector() {
      const sel = document.getElementById("seasonSelect");
      sel.innerHTML = '<option value="Career">🏆 Career</option>';
      if (allTeams[currentTeam]) {
        Object.keys(allTeams[currentTeam]).forEach(s => {
          const opt = document.createElement("option");
          opt.value = s; opt.textContent = s;
          if (s === currentView) opt.selected = true;
          sel.appendChild(opt);
        });
      }
      document.getElementById("seasonSelector").style.display = "block";
    }

    function switchSeason() { currentView = document.getElementById("seasonSelect").value; loadCurrentView(); }

    function deleteCurrentSeason() {
      if (!currentTeam || !currentView || currentView === "Career") {
        return alert("Select a specific season to delete — Career view cannot be deleted.");
      }
      if (!confirm(`Delete season "${currentView}" from ${currentTeam}? This cannot be undone.`)) return;
      delete allTeams[currentTeam][currentView];
      saveData();
      // Reset to Career or first remaining season
      const remaining = Object.keys(allTeams[currentTeam]);
      currentView = remaining.length > 0 ? remaining[0] : "Career";
      updateSeasonSelector();
      loadCurrentView();
    }

    function loadCurrentView() {
      if (!currentTeam) return;
      const teamSeasons = allTeams[currentTeam] || {};
      if (currentView === "Career") {
        const map = {};
        Object.values(teamSeasons).flat().forEach(p => {
          // BUG FIX #6: use full name (mergeKey) instead of firstName to avoid collisions
          const key = p.mergeKey || p.name.toLowerCase();
          if (!map[key]) map[key] = {...p, gp:0,atBats:0,hits:0,walks:0,homeRuns:0,rbis:0,strikeouts:0,inningsPitched:0,earnedRuns:0};
          const t = map[key];
          ["gp","atBats","hits","walks","homeRuns","rbis","strikeouts","inningsPitched","earnedRuns",
           "posP","posC","pos1B","pos2B","pos3B","posSS","posLF","posCF","posRF"].forEach(k => {
            t[k] = (t[k] || 0) + (p[k] || 0);
          });
        });
        players = Object.values(map);
      } else {
        players = teamSeasons[currentView] || [];
      }
      players.sort((a,b) => (b.atBats ? b.hits/b.atBats : 0) - (a.atBats ? a.hits/a.atBats : 0));
      currentSort = { col: -1, dir: 1 }; // reset sort state on view change
      renderSummary();
      renderRoster();
      renderTeamTable();
    }

    function renderSummary() {
      let hr=0, rbi=0, ab=0, h=0;
      players.forEach(p=>{hr+=p.homeRuns||0; rbi+=p.rbis||0; ab+=p.atBats||0; h+=p.hits||0;});
      const avg = ab ? (h/ab).toFixed(3) : ".000";
      document.getElementById("summarySection").innerHTML = `Team AVG: <strong>${avg}</strong> | HR: <strong>${hr}</strong> | RBI: <strong>${rbi}</strong>`;
      document.getElementById("summarySection").style.display = "block";
    }

    function renderRoster() {
      const container = document.getElementById("playerList");
      container.innerHTML = `<h2>${currentTeam} — ${currentView} (${players.length} players)</h2>`;
      players.forEach((p, i) => {
        const avg = p.atBats ? (p.hits / p.atBats).toFixed(3) : ".000";
        const obp = (p.atBats + p.walks) ? ((p.hits + p.walks)/(p.atBats + p.walks)).toFixed(3) : ".000";
        // BUG FIX #4: correct SLG formula — singles + 4×HR (HR already counted in hits, so +3 extra per HR)
        const singles = Math.max(0, p.hits - p.homeRuns);
        const slg = p.atBats ? ((singles + 4 * (p.homeRuns||0)) / p.atBats).toFixed(3) : ".000";
        const kPct = p.atBats ? ((p.strikeouts / p.atBats) * 100).toFixed(1) + "%" : "—";
        const bbPct = p.atBats ? ((p.walks / p.atBats) * 100).toFixed(1) + "%" : "—";
        const bo = p.battingOrder ? `#${p.battingOrder}` : "—";
        const div = document.createElement("div");
        div.className = "player-card";
        div.innerHTML = `<div class="number">#${p.number}</div><div style="flex:1"><strong style="font-size:1.45em;">${p.name}</strong><br>GP: ${p.gp} | AVG: <strong>${avg}</strong> | OBP: ${obp} | SLG: ${slg} | H: <strong>${p.hits}</strong><br>K%: ${kPct} | BB%: ${bbPct} | BO: <strong>${bo}</strong></div>`;
        div.onclick = () => showProfile(i);
        container.appendChild(div);
      });
    }

    function showProfile(i) {
      const p = players[i];
      const avg = p.atBats ? (p.hits / p.atBats).toFixed(3) : ".000";
      const obp = (p.atBats + p.walks) ? ((p.hits + p.walks)/(p.atBats + p.walks)).toFixed(3) : ".000";
      // BUG FIX #4: correct SLG in profile modal too
      const singles = Math.max(0, p.hits - p.homeRuns);
      const slg = p.atBats ? ((singles + 4 * (p.homeRuns||0)) / p.atBats).toFixed(3) : ".000";
      const ops = (parseFloat(obp) + parseFloat(slg)).toFixed(2);
      const kPct = p.atBats ? ((p.strikeouts / p.atBats) * 100).toFixed(1) + "%" : "—";
      const bbPct = p.atBats ? ((p.walks / p.atBats) * 100).toFixed(1) + "%" : "—";
      const era = p.inningsPitched > 0 ? (p.earnedRuns * 7 / p.inningsPitched).toFixed(2) : "—";

      document.getElementById("modalName").textContent = `#${p.number} ${p.name}`;
      document.getElementById("modalBody").innerHTML = `
        <p>GP: ${p.gp} | AVG: ${avg} | OBP: ${obp} | SLG: ${slg} | OPS: ${ops} | H: <strong>${p.hits}</strong> | BO: <strong>${p.battingOrder ? "#"+p.battingOrder : "—"}</strong></p>
        <p>HR: ${p.homeRuns} | RBI: ${p.rbis} | BB: ${p.walks} (${bbPct}) | SO: ${p.strikeouts} (${kPct})</p>
        ${p.inningsPitched > 0 ? `<p>IP: ${p.inningsPitched.toFixed(1)} | ERA: ${era}</p>` : ''}
      `;
      document.getElementById("playerModal").style.display = "block";

      setTimeout(() => {
        const positions = [
          {name:"P", val:p.posP}, {name:"C", val:p.posC}, {name:"1B", val:p.pos1B},
          {name:"2B", val:p.pos2B}, {name:"3B", val:p.pos3B}, {name:"SS", val:p.posSS},
          {name:"LF", val:p.posLF}, {name:"CF", val:p.posCF}, {name:"RF", val:p.posRF}
        ];
        const totalPos = positions.reduce((a,b)=>a+b.val,0);
        const filteredPos = positions.filter(pos => pos.val > 0.5);

        if (posChart) posChart.destroy();
        posChart = new Chart(document.getElementById("posChart"), {
          type: 'pie',
          data: { labels: filteredPos.map(pos => pos.name),
            datasets: [{ data: filteredPos.map(pos => pos.val), backgroundColor: ['#22c55e','#3b82f6','#eab308','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#6366f1'] }]
          },
          options: {
            plugins: {
              datalabels: {
                formatter: (value) => totalPos > 0 ? Math.round((value / totalPos) * 100) + '%' : '',
                color: '#fff', font: { weight: 'bold', size: 16 }
              }
            }
          },
          plugins: [ChartDataLabels]
        });

        const otherOuts = Math.max(0, p.atBats - p.hits - p.strikeouts);
        const totalHitting = (p.homeRuns||0) + singles + (p.walks||0) + (p.strikeouts||0) + otherOuts;

        if (hittingChart) hittingChart.destroy();
        hittingChart = new Chart(document.getElementById("hittingChart"), {
          type: 'pie',
          data: {
            labels: ['HR', 'Singles', 'Walks', 'Strikeouts', 'Other Outs'],
            datasets: [{ data: [p.homeRuns||0, singles, p.walks||0, p.strikeouts||0, otherOuts], backgroundColor: ['#ef4444', '#eab308', '#3b82f6', '#f97316', '#64748b'] }]
          },
          options: {
            plugins: {
              datalabels: {
                formatter: (value) => totalHitting > 0 ? Math.round((value / totalHitting) * 100) + '%' : '',
                color: '#fff', font: { weight: 'bold', size: 16 }
              }
            }
          },
          plugins: [ChartDataLabels]
        });
      }, 300);
    }

    function closeModal() { document.getElementById("playerModal").style.display = "none"; }

    function switchTab(n) {
      document.querySelectorAll('.tab').forEach((tab, i) => tab.classList.toggle('active', i === n));
      document.getElementById("playerList").style.display = n === 0 ? "block" : "none";
      document.getElementById("teamTableContainer").style.display = n === 1 ? "block" : "none";
      document.getElementById("boxScoresContainer").style.display = n === 2 ? "block" : "none";
      document.getElementById("lineupTrackerContainer").style.display = n === 3 ? "block" : "none";

      if (n === 1) renderTeamTable();
      if (n === 2) renderBoxScores();
      if (n === 3) renderLineupTracker();
    }

    // BUG FIX #2: sortTable now actually re-renders the table with sorted data
    function sortTable(colIndex) {
      if (currentSort.col === colIndex) {
        currentSort.dir *= -1;
      } else {
        currentSort.col = colIndex;
        currentSort.dir = 1;
      }

      // Define how to extract a sortable value from each player row by column index
      const getValue = (p, col) => {
        const singles = Math.max(0, p.hits - p.homeRuns);
        const ab = p.atBats || 0;
        const avg = ab ? p.hits / ab : 0;
        const slg = ab ? (singles + 4 * (p.homeRuns||0)) / ab : 0;
        const obp = (ab + p.walks) ? (p.hits + p.walks) / (ab + p.walks) : 0;
        const totalPos = (p.posP + p.posC + p.pos1B + p.pos2B + p.pos3B + p.posSS + p.posLF + p.posCF + p.posRF) || 1;
        switch(col) {
          case 0: return parseInt(p.number) || 0;
          case 1: return p.name;
          case 2: return p.gp || 0;
          case 3: return avg;
          case 4: return p.hits || 0;
          case 5: return slg;
          case 6: return obp;
          case 7: return obp + slg;
          case 8: return p.battingOrder || 0;
          case 9: return p.homeRuns || 0;
          case 10: return p.rbis || 0;
          case 11: return p.walks || 0;
          case 12: return ab ? p.walks / ab : 0;
          case 13: return p.strikeouts || 0;
          case 14: return ab ? p.strikeouts / ab : 0;
          case 15: return p.inningsPitched || 0;
          case 16: return p.inningsPitched > 0 ? p.earnedRuns * 7 / p.inningsPitched : 999;
          case 17: return p.inningsPitched > 0 ? (p.hits + p.walks) / p.inningsPitched : 999;
          case 18: return p.posP / totalPos;
          case 19: return p.posC / totalPos;
          case 20: return p.pos1B / totalPos;
          case 21: return p.pos2B / totalPos;
          case 22: return p.pos3B / totalPos;
          case 23: return p.posSS / totalPos;
          case 24: return p.posLF / totalPos;
          case 25: return p.posCF / totalPos;
          case 26: return p.posRF / totalPos;
          default: return 0;
        }
      };

      players.sort((a, b) => {
        const va = getValue(a, colIndex);
        const vb = getValue(b, colIndex);
        if (typeof va === 'string') return currentSort.dir * va.localeCompare(vb);
        return currentSort.dir * (va - vb);
      });

      renderTeamTable();
    }

    function renderTeamTable() {
      const container = document.getElementById("teamTableContainer");
      const cols = ['#','Player','GP','AVG','H','SLG','OBP','OPS','BO','HR','RBI','BB','BB%','SO','K%','IP','ERA','WHIP','P%','C%','1B%','2B%','3B%','SS%','LF%','CF%','RF%'];

      let html = `<h2>${currentTeam} — ${currentView} Team Stats Table</h2>`;
      html += `<table id="statsTable"><thead><tr>`;
      cols.forEach((col, i) => {
        let cls = '';
        if (currentSort.col === i) cls = currentSort.dir === 1 ? 'sort-asc' : 'sort-desc';
        html += `<th class="${cls}" onclick="sortTable(${i})">${col}</th>`;
      });
      html += `</tr></thead><tbody>`;

      players.forEach(p => {
        const singles = Math.max(0, p.hits - p.homeRuns);
        const avg = p.atBats ? (p.hits / p.atBats).toFixed(3) : ".000";
        // BUG FIX #4: correct SLG in table too
        const slg = p.atBats ? ((singles + 4 * (p.homeRuns||0)) / p.atBats).toFixed(3) : ".000";
        const obp = (p.atBats + p.walks) ? ((p.hits + p.walks)/(p.atBats + p.walks)).toFixed(3) : ".000";
        const ops = (parseFloat(obp) + parseFloat(slg)).toFixed(2);
        const bbPct = p.atBats ? ((p.walks / p.atBats) * 100).toFixed(1) + "%" : "—";
        const kPct = p.atBats ? ((p.strikeouts / p.atBats) * 100).toFixed(1) + "%" : "—";
        const bo = p.battingOrder ? p.battingOrder : "—";
        const ip = p.inningsPitched ? p.inningsPitched.toFixed(1) : "—";
        const era = p.inningsPitched > 0 ? (p.earnedRuns * 7 / p.inningsPitched).toFixed(2) : "—";
        const whip = p.inningsPitched > 0 ? ((p.hits + p.walks)/p.inningsPitched).toFixed(2) : "—";
        const totalPos = (p.posP + p.posC + p.pos1B + p.pos2B + p.pos3B + p.posSS + p.posLF + p.posCF + p.posRF) || 1;

        html += `<tr>
          <td>#${p.number}</td><td>${p.name}</td><td>${p.gp}</td><td>${avg}</td><td>${p.hits}</td><td>${slg}</td><td>${obp}</td><td>${ops}</td><td>${bo}</td>
          <td>${p.homeRuns}</td><td>${p.rbis}</td><td>${p.walks}</td><td>${bbPct}</td><td>${p.strikeouts}</td><td>${kPct}</td>
          <td>${ip}</td><td>${era}</td><td>${whip}</td>
          <td>${Math.round(p.posP/totalPos*100)}%</td><td>${Math.round(p.posC/totalPos*100)}%</td>
          <td>${Math.round(p.pos1B/totalPos*100)}%</td><td>${Math.round(p.pos2B/totalPos*100)}%</td>
          <td>${Math.round(p.pos3B/totalPos*100)}%</td><td>${Math.round(p.posSS/totalPos*100)}%</td>
          <td>${Math.round(p.posLF/totalPos*100)}%</td><td>${Math.round(p.posCF/totalPos*100)}%</td>
          <td>${Math.round(p.posRF/totalPos*100)}%</td>
        </tr>`;
      });
      html += `</tbody></table>`;
      container.innerHTML = html;
    }

    // BUG FIX #1: removeCurrentTeam now clears the UI when no teams remain
    function removeCurrentTeam() {
      if (!currentTeam || !confirm(`Delete team ${currentTeam}?`)) return;
      delete allTeams[currentTeam];
      delete allLineupGames[currentTeam];
      currentTeam = Object.keys(allTeams)[0] || "";
      players = [];
      updateTeamSelector();
      saveData();

      if (currentTeam) {
        currentView = "Career";
        updateSeasonSelector();
        loadCurrentView();
      } else {
        // No teams left — clear everything
        currentView = "Career";
        document.getElementById("playerList").innerHTML = "";
        document.getElementById("teamTableContainer").innerHTML = "";
        document.getElementById("boxScoresContainer").innerHTML = "";
        document.getElementById("lineupTrackerContainer").innerHTML = "";
        document.getElementById("summarySection").style.display = "none";
        document.getElementById("seasonSelector").style.display = "none";
      }
    }

    // ==================== LINEUP TRACKER ====================

    function renderBoxScores() {
      const lineupGames = getLineupGames();
      const container = document.getElementById("boxScoresContainer");
      let html = `<h2>Box Scores - ${currentTeam}</h2>
        <label style="display:block;background:#22c55e;color:black;text-align:center;padding:18px;border-radius:16px;font-size:1.2em;font-weight:bold;cursor:pointer;margin-bottom:15px;">
          📸 Upload Box Score Photos
          <input type="file" accept="image/*" multiple style="display:none" onchange="addNewLineupGame(event)">
        </label>
        <div id="ocrProgress" style="display:none;background:#334155;padding:12px;border-radius:10px;margin-bottom:12px;text-align:center;"></div>`;

      if (lineupGames.length === 0) {
        html += `<p style="color:#94a3b8;">No photos yet. You can select multiple photos at once.</p>`;
      } else {
        html += `<p style="color:#94a3b8;">${lineupGames.length} box score(s) uploaded. <button onclick="clearAllGames()" style="background:#ef4444;width:auto;padding:8px 16px;min-height:unset;font-size:1em;">🗑️ Clear All</button></p>`;
        lineupGames.forEach((game, i) => {
          html += `
            <div class="lineup-game">
              <strong>Box Score ${i + 1}</strong> — ${game.lineup ? game.lineup.length : 0} players parsed
              <button onclick="deleteLineupGame(${i})" style="background:#ef4444;width:auto;padding:6px 14px;min-height:unset;font-size:0.95em;margin-left:10px;">Delete</button><br>
              <p style="color:#94a3b8;font-size:0.9em;">${game.lineup && game.lineup.length ? game.lineup.join(", ") : 'No players detected'}</p>
            </div>`;
        });
      }
      container.innerHTML = html;
    }

    function renderLineupTracker() {
      const container = document.getElementById("lineupTrackerContainer");
      let html = `<h2>Lineup Tracker - ${currentTeam}</h2>`;
      html += generateLineupSummaryTable();
      container.innerHTML = html;
    }

    function generateLineupSummaryTable() {
      const lineupGames = getLineupGames();
      if (lineupGames.length === 0) return "<p>No lineup data yet. Upload some box scores first.</p>";

      let maxSpot = 0;
      lineupGames.forEach(game => {
        if (game.lineup) maxSpot = Math.max(maxSpot, game.lineup.length);
      });

      let html = `<table><thead><tr><th>Player</th>`;
      for (let i = 1; i <= maxSpot; i++) html += `<th>Spot ${i}</th>`;
      html += `</tr></thead><tbody>`;

      const playerSpotStats = {};

      lineupGames.forEach(game => {
        if (!game.lineup) return;
        game.lineup.forEach((player, idx) => {
          const spot = idx + 1;
          const statLine = game.stats && game.stats[idx] ? game.stats[idx] : {ab:0, r:0, h:0, rbi:0, bb:0, so:0};
          if (!playerSpotStats[player]) playerSpotStats[player] = {};
          if (!playerSpotStats[player][spot]) playerSpotStats[player][spot] = {games: 0, ab: 0, r: 0, h: 0, rbi: 0, bb: 0, so: 0};
          const data = playerSpotStats[player][spot];
          data.games++;
          data.ab  += statLine.ab  || 0;
          data.r   += statLine.r   || 0;
          data.h   += statLine.h   || 0;
          data.rbi += statLine.rbi || 0;
          data.bb  += statLine.bb  || 0;
          data.so  += statLine.so  || 0;
        });
      });

      const sortedPlayers = Object.keys(playerSpotStats).sort((a, b) => {
        let totalA = 0, totalB = 0;
        Object.values(playerSpotStats[a]).forEach(s => totalA += s.games);
        Object.values(playerSpotStats[b]).forEach(s => totalB += s.games);
        return totalB - totalA;
      });

      sortedPlayers.forEach(player => {
        html += `<tr><td><strong>${player}</strong></td>`;
        for (let s = 1; s <= maxSpot; s++) {
          const data = playerSpotStats[player][s] || {games: 0, ab: 0, r: 0, h: 0, rbi: 0, bb: 0, so: 0};
          const pct = lineupGames.length > 0 ? Math.round((data.games / lineupGames.length) * 100) : 0;
          const avg = data.ab > 0 ? (data.h / data.ab).toFixed(3) : "—";
          html += `<td>
            ${data.games} <small>(${pct}%)</small><br>
            AVG: ${avg}<br>
            H: ${Number(data.h)} | R: ${Number(data.r)} | RBI: ${Number(data.rbi)}<br>
            BB: ${Number(data.bb)} | SO: ${Number(data.so)}
          </td>`;
        }
        html += `</tr>`;
      });

      html += `</tbody></table>`;
      return html;
    }

    function parseLineFromOCR(line) {
      const nameMatch = line.match(/([A-Z][a-z]+ [A-Z][a-z]+)/);
      if (!nameMatch) return null;
      const name = nameMatch[1].trim();
      if (name.length < 6 || name.includes("TEAM") || name.includes("LINEUP") || name.includes("RA BLK")) return null;

      let statsPart = line.slice(line.indexOf(nameMatch[0]) + nameMatch[0].length);
      statsPart = statsPart.replace(/#\d+/g, '');
      statsPart = statsPart.replace(/\([^)]*\)/g, '');
      statsPart = statsPart.replace(/\b(1B|2B|3B|SS|CF|LF|RF|DH|[PC])\b/gi, '');
      let statNums = statsPart.match(/\b\d+\b/g) || [];
      if (statNums.length > 0 && /^\d{2}$/.test(statNums[0])) {
        statNums = [statNums[0][0], statNums[0][1], ...statNums.slice(1)];
      }
      const s = statNums;
      const stat = (s.length >= 3)
        ? { ab: +s[0]||0, r: +s[1]||0, h: +s[2]||0, rbi: +s[3]||0, bb: +s[4]||0, so: +s[5]||0 }
        : { ab:0, r:0, h:0, rbi:0, bb:0, so:0 };
      return { name, stat };
    }

    async function processPhotoFile(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const photoData = ev.target.result;
          try {
            const worker = await Tesseract.createWorker('eng');
            const result = await worker.recognize(photoData);
            await worker.terminate();
            const text = result.data.text.trim();
            const lineup = [], stats = [];
            text.split('\n').forEach(line => {
              const parsed = parseLineFromOCR(line);
              if (parsed) { lineup.push(parsed.name); stats.push(parsed.stat); }
            });
            resolve({ lineup, stats });
          } catch(err) {
            resolve({ lineup: [], stats: [] });
          }
        };
        reader.readAsDataURL(file);
      });
    }

    async function addNewLineupGame(event) {
      if (!currentTeam) return alert("Select a team first");
      const files = Array.from(event.target.files);
      if (!files.length) return;

      if (!allLineupGames[currentTeam]) allLineupGames[currentTeam] = [];

      const progress = document.getElementById("ocrProgress");
      progress.style.display = "block";

      for (let i = 0; i < files.length; i++) {
        progress.textContent = `Processing photo ${i + 1} of ${files.length}...`;
        const gameData = await processPhotoFile(files[i]);
        allLineupGames[currentTeam].push(gameData);
        saveData();
        renderBoxScores();      // re-render after each so progress div stays visible
        renderLineupTracker();
        // Re-grab progress element since renderBoxScores rebuilds the DOM
        const prog = document.getElementById("ocrProgress");
        if (prog) { prog.style.display = "block"; prog.textContent = `Processing photo ${i + 1} of ${files.length}...`; }
      }

      const prog = document.getElementById("ocrProgress");
      if (prog) { prog.textContent = `✅ Done! ${files.length} photo(s) processed.`; setTimeout(() => { if (prog) prog.style.display = "none"; }, 3000); }
      renderBoxScores();
      renderLineupTracker();
    }

    function clearAllGames() {
      if (!currentTeam || !confirm("Clear all box scores for this team?")) return;
      allLineupGames[currentTeam] = [];
      saveData();
      renderBoxScores();
      renderLineupTracker();
    }

    function deleteLineupGame(i) {
      if (confirm("Delete this game?")) {
        getLineupGames().splice(i, 1);
        saveData();
        renderBoxScores();
        renderLineupTracker();
      }
    }
  </script>
