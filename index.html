
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Assistant Coach ⚾</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin:0; background:#0f172a; color:white; }
    .container { padding:20px; max-width:1400px; margin:auto; }
    button, select { padding:20px; margin:10px 0; font-size:1.3em; min-height:70px; border-radius:16px; width:100%; }
    .player-card { background:#334155; border-radius:16px; padding:20px; margin:12px 0; cursor:pointer; }
    .number { font-size:3em; font-weight:bold; color:#22c55e; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Assistant Coach ⚾</h1>

    <div style="background:#1e2937;padding:20px;border-radius:16px;margin:15px 0;">
      <h2>Backup & Restore</h2>
      <button onclick="copyBackupToClipboard()" style="background:#eab308;color:black;">📋 COPY BACKUP</button>
      <button onclick="downloadBackup()">⬇️ Download Backup</button>
      <button onclick="document.getElementById('restoreInput').click()" style="background:#22c55e;color:black;">⬆️ Restore from Backup</button>
      <input type="file" id="restoreInput" accept=".json" style="display:none" onchange="restoreBackup(event)">
    </div>

    <div style="background:#1e2937;padding:20px;border-radius:16px;margin:15px 0;">
      <select id="teamSelect" onchange="switchTeam()"></select>
      <button onclick="createNewTeam()">+ New Team</button>
      <button onclick="removeCurrentTeam()">🗑️ Remove Team</button>
    </div>

    <div style="background:#1e2937;padding:20px;border-radius:16px;margin:15px 0;">
      <input type="file" id="csvFile" accept=".csv" style="width:100%;margin-bottom:10px;">
      <button onclick="importNewSeason()" style="background:#3b82f6;">📤 Import GameChanger CSV</button>
    </div>

    <div id="playerList"></div>
  </div>

  <div id="playerModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <h1 id="modalName"></h1>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    let allTeams = {};
    let currentTeam = "";

    function createNewTeam() {
      const name = prompt("New team name:", "RA BLK 13U");
      if (name) {
        currentTeam = name;
        allTeams[name] = {};
        alert("Team created: " + name);
      }
    }

    function importNewSeason() {
      if (!currentTeam) return alert("Create a team first");
      const file = document.getElementById("csvFile").files[0];
      if (!file) return alert("Select a CSV file");
      alert("CSV selected - parsing would happen here");
    }

    function copyBackupToClipboard() {
      alert("Backup copied to clipboard");
    }

    function downloadBackup() {
      alert("Download started");
    }

    function restoreBackup(event) {
      alert("Restore function triggered");
    }

    function switchTeam() {
      alert("Team switched");
    }

    function removeCurrentTeam() {
      alert("Team removed");
    }

    function closeModal() {
      document.getElementById("playerModal").style.display = "none";
    }

    console.log("✅ Minimal test version loaded");
  </script>
</body>
</html>
