
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistant Coach - Test</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:30px; text-align:center; }
    button { padding:25px; font-size:1.5em; margin:15px; width:80%; border-radius:12px; background:#22c55e; color:black; }
  </style>
</head>
<body>
  <h1>Assistant Coach - Test Version</h1>
  
  <button onclick="testButton()">Test Button - Click Me</button>
  <button onclick="createNewTeam()">+ New Team</button>

  <div id="output" style="margin-top:30px; font-size:1.3em;"></div>

  <script>
    console.log("Test script loaded");

    function testButton() {
      alert("✅ Button works!");
      document.getElementById("output").innerHTML += "<p>Button clicked successfully!</p>";
    }

    function createNewTeam() {
      const name = prompt("Team name?", "RA BLK 13U");
      if (name) {
        document.getElementById("output").innerHTML += `<p>Team created: ${name}</p>`;
      }
    }
  </script>
</body>
</html>
