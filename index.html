<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Assistant Coach">
  <meta name="theme-color" content="#22c55e">
 
  <link rel="manifest" href="data:application/manifest+json,{
    &quot;name&quot;:&quot;Assistant Coach ⚾&quot;,
    &quot;short_name&quot;:&quot;Asst Coach&quot;,
    &quot;start_url&quot;:&quot;.&quot;,
    &quot;display&quot;:&quot;standalone&quot;,
    &quot;background_color&quot;:&quot;#0f172a&quot;,
    &quot;theme_color&quot;:&quot;#22c55e&quot;,
    &quot;icons&quot;:[{
      &quot;src&quot;:&quot;https://raw.githubusercontent.com/ckcurtis06/Assistant-coach_v1/main/icon-512.png&quot;,
      &quot;sizes&quot;:&quot;512x512&quot;,
      &quot;type&quot;:&quot;image/png&quot;,
      &quot;purpose&quot;:&quot;any maskable&quot;
    }]
  }">

  <title>Assistant Coach ⚾</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5/dist/tesseract.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin:0; background:#0f172a; color:white; }
    .container { padding:20px; max-width:1400px; margin:auto; }
    button, select { padding:18px 24px; margin:8px 0; font-size:1.2em; min-height:65px; border-radius:16px; width:100%; }
    .player-card { background:#334155; border-radius:16px; padding:20px; margin:12px 0; cursor:pointer; display:flex; align-items:center; gap:20px; }
    .number { font-size:3em; font-weight:bold; color:#22c55e; min-width:90px; text-align:center; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; overflow:auto; }
    .modal-content { background:#1e2937; margin:20px auto; padding:25px; max-width:1100px; border-radius:16px; }
    .close { float:right; font-size:3em; cursor:pointer; color:#ef4444; }
    .charts { display:flex; gap:30px; flex-wrap:wrap; justify-content:center; }
    .chart-container { width:100%; max-width:460px; text-align:center; }
    
    .tabs { display:flex; gap:10px; margin:15px 0; flex-wrap:wrap; }
    .tab { flex:1; min-width:140px; padding:18px; text-align:center; font-size:1.2em; background:#334155; border-radius:12px; cursor:pointer; }
    .tab.active { background:#22c55e; color:black; font-weight:bold; }

    table { width:100%; border-collapse:collapse; background:#1e2937; border-radius:12px; overflow:hidden; margin-top:10px; }
    th, td { padding:12px 8px; text-align:center; border-bottom:1px solid #334155; }
    th { background:#334155; cursor:pointer; user-select:none; }
    th:hover { background:#475569; }
    tr:hover { background:#334155; }
    .sort-asc::after { content: " ↑"; }
    .sort-desc::after { content: " ↓"; }

    .lineup-game { background:#1e2937; padding:15px; margin:10px 0; border-radius:12px; }
    .photo-preview { max-width:100%; max-height:400px; border-radius:8px; margin:10px 0; }
    .ocr-result { background:#334155; padding:10px; border-radius:8px; white-space:pre-wrap; font-size:0.95em; margin:8px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Assistant Coach ⚾</h1>

    <!-- Backup & Restore -->
    <div style="background:#1e2937;padding:20px;border-radius:16px;margin:15px 0;">
      <h2>Backup & Restore</h2>
      <button onclick="copyBackupToClipboard()" style="background:#eab308;color:black;">📋 COPY BACKUP TO CLIPBOARD</button>
      <button onclick="downloadBackup()">⬇️ Download Backup</button>
      <button onclick="document.getElementById('restoreInput').click()" style="background:#22c55e;color:black;">⬆️ Restore from Backup</button>
      <input type="file" id="restoreInput" accept=".json" style="display:none" onchange="restoreBackup(event)">
    </div>

    <!-- Team Management -->
    <div style="background:#1e2937;padding:20px;border-radius:16px;margin:15px 0;">
      <select id="teamSelect" onchange="switchTeam()"></select>
      <button onclick="createNewTeam()">+ New Team</button>
      <button onclick="removeCurrentTeam()">🗑️ Remove Team</button>
    </div>

    <!-- Import -->
    <div style="background:#1e2937;padding:20px;border-radius:16px;margin:15px 0;">
      <input type="file" id="csvFile" accept=".csv" style="width:100%;margin-bottom:10px;">
      <button onclick="importNewSeason()" style="background:#3b82f6;">📤 Import GameChanger CSV</button>
    </div>

    <div id="seasonSelector" style="display:none;background:#1e2937;padding:20px;border-radius:16px;margin:15px 0;">
      <select id="seasonSelect" onchange="switchSeason()"></select>
    </div>

    <div id="summarySection" style="background:#334155;padding:18px;border-radius:12px;text-align:center;font-size:1.4em;margin:15px 0;display:none;"></div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tabCards" onclick="switchTab(0)">Player Cards</div>
      <div class="tab" id="tabTable" onclick="switchTab(1)">Team Stats Table</div>
      <div class="tab" id="tabLineup" onclick="switchTab(2)">Lineup Tracker</div>
    </div>

    <div id="playerList"></div>
    <div id="teamTableContainer" style="display:none;"></div>
    <div id="lineupTrackerContainer" style="display:none;"></div>
  </div>

  <!-- Player Modal -->
  <div id="playerModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <h1 id="modalName"></h1>
      <div id="modalBody"></div>
      <div class="charts">
        <div class="chart-container"><h3>Positions Played</h3><canvas id="posChart" height="380"></canvas></div>
        <div class="chart-container"><h3>Hitting Breakdown</h3><canvas id="hittingChart" height="380"></canvas></div>
      </div>
    </div>
  </div>

  <script>
    // ALL YOUR PREVIOUS CODE REMAINS 100% UNCHANGED
    let allTeams = {};
    let currentTeam = "";
    let currentView = "Career";
    let players = [];
    let posChart = null;
    let hittingChart = null;
    let currentSort = { col: -1, dir: 1 };
    const STORAGE_KEY = "AssistantCoach_Full_v2";

    window.onload = () => {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) allTeams = JSON.parse(saved);
      updateTeamSelector();
    };

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(allTeams)); }

    function copyBackupToClipboard() {
      if (Object.keys(allTeams).length === 0) return alert("No data yet");
      navigator.clipboard.writeText(JSON.stringify(allTeams, null, 2)).then(() => {
        alert("✅ Backup copied to clipboard!\nPaste into Notes app and save.");
      });
    }

    function downloadBackup() {
      if (Object.keys(allTeams).length === 0) return alert("No data");
      const dataStr = JSON.stringify(allTeams, null, 2);
      const blob = new Blob([dataStr], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `AssistantCoach_Backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click(); URL.revokeObjectURL(url);
    }

    function restoreBackup(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          allTeams = JSON.parse(e.target.result);
          updateTeamSelector();
          if (Object.keys(allTeams).length > 0) {
            currentTeam = Object.keys(allTeams)[0];
            updateSeasonSelector();
            currentView = Object.keys(allTeams[currentTeam])[0] || "Career";
            loadCurrentView();
          }
          saveData();
          alert("✅ Backup restored successfully! All seasons should now be available.");
        } catch(err) {
          alert("❌ Invalid backup file");
        }
      };
      reader.readAsText(file);
    }

    function createNewTeam() {
      const name = prompt("New team name:", "RA BLK 13U");
      if (name) { 
        allTeams[name] = {}; 
        currentTeam = name; 
        updateTeamSelector(); 
        saveData(); 
      }
    }

    function updateTeamSelector() {
      const sel = document.getElementById("teamSelect");
      sel.innerHTML = "";
      Object.keys(allTeams).forEach(t => {
        const opt = document.createElement("option");
        opt.value = t; opt.textContent = t;
        if (t === currentTeam) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function switchTeam() { 
      currentTeam = document.getElementById("teamSelect").value; 
      if (currentTeam) loadCurrentView(); 
    }

    function importNewSeason() {
      if (!currentTeam) return alert("Create/select a team first");
      const file = document.getElementById("csvFile").files[0];
      if (!file) return alert("Select CSV file");
      const seasonName = prompt("Season name:", "Spring 2026");
      if (!seasonName) return;

      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: (results) => {
          const seasonPlayers = results.data.map(row => {
            const first = (row["First"] || row["First name"] || "").trim();
            const last = (row["Last"] || row["Last name"] || "").trim();
            const name = first && last ? `${first} ${last}` : first || last || "";
            if (name.length < 3) return null;
            return {
              number: (row["#"] || row["Number"] || "?").trim(),
              name: name,
              firstName: first.toLowerCase(),
              gp: parseInt(row["GP"] || 0),
              atBats: parseInt(row["AB"] || 0),
              hits: parseInt(row["H"] || 0),
              walks: parseInt(row["BB"] || 0),
              homeRuns: parseInt(row["HR"] || 0),
              rbis: parseInt(row["RBI"] || 0),
              strikeouts: parseInt(row["SO"] || row["K"] || 0),
              inningsPitched: parseFloat(row["IP"] || 0),
              earnedRuns: parseInt(row["ER"] || 0),
              battingOrder: parseInt(row["Batting Order"] || row["Lineup"] || row["Order"] || row["BO"] || row["Spot"] || 0),
              posP: parseFloat(row["P"] || row["Pitching"] || row["DEF_P"] || 0),
              posC: parseFloat(row["C"] || row["Catcher"] || row["DEF_C"] || 0),
              pos1B: parseFloat(row["DEF_1B"] || row["1B"] || 0),
              pos2B: parseFloat(row["DEF_2B"] || row["2B"] || 0),
              pos3B: parseFloat(row["DEF_3B"] || row["3B"] || 0),
              posSS: parseFloat(row["SS"] || row["DEF_SS"] || 0),
              posLF: parseFloat(row["LF"] || row["DEF_LF"] || 0),
              posCF: parseFloat(row["CF"] || row["DEF_CF"] || 0),
              posRF: parseFloat(row["RF"] || row["DEF_RF"] || 0),
            };
          }).filter(p => p);

          if (!allTeams[currentTeam]) allTeams[currentTeam] = {};
          allTeams[currentTeam][seasonName] = seasonPlayers;

          currentView = seasonName;
          updateSeasonSelector();
          loadCurrentView();
          saveData();
          alert(`✅ Imported ${seasonPlayers.length} players`);
        }
      });
    }

    function updateSeasonSelector() {
      const sel = document.getElementById("seasonSelect");
      sel.innerHTML = '<option value="Career">🏆 Career</option>';
      if (allTeams[currentTeam]) {
        Object.keys(allTeams[currentTeam]).forEach(s => {
          const opt = document.createElement("option");
          opt.value = s; opt.textContent = s;
          if (s === currentView) opt.selected = true;
          sel.appendChild(opt);
        });
      }
      document.getElementById("seasonSelector").style.display = "block";
    }

    function switchSeason() { 
      currentView = document.getElementById("seasonSelect").value; 
      loadCurrentView(); 
    }

    function loadCurrentView() {
      if (!currentTeam) return;
      const teamSeasons = allTeams[currentTeam] || {};

      if (currentView === "Career") {
        const map = {};
        Object.values(teamSeasons).flat().forEach(p => {
          const key = p.firstName || p.name.toLowerCase();
          if (!map[key]) map[key] = {...p, gp:0,atBats:0,hits:0,walks:0,homeRuns:0,rbis:0,strikeouts:0,inningsPitched:0,earnedRuns:0};
          const t = map[key];
          Object.keys(p).forEach(k => { if (typeof p[k]==="number") t[k] = (t[k]||0) + p[k]; });
        });
        players = Object.values(map);
      } else {
        players = teamSeasons[currentView] || [];
      }

      players.sort((a,b) => (b.atBats ? b.hits/b.atBats : 0) - (a.atBats ? a.hits/a.atBats : 0));
      renderSummary();
      renderRoster();
      renderTeamTable();
    }

    function renderSummary() {
      let hr=0, rbi=0, ab=0, h=0;
      players.forEach(p=>{hr+=p.homeRuns||0; rbi+=p.rbis||0; ab+=p.atBats||0; h+=p.hits||0;});
      const avg = ab ? (h/ab).toFixed(3) : ".000";
      document.getElementById("summarySection").innerHTML = `Team AVG: <strong>${avg}</strong> | HR: <strong>${hr}</strong> | RBI: <strong>${rbi}</strong>`;
      document.getElementById("summarySection").style.display = "block";
    }

    function renderRoster() {
      const container = document.getElementById("playerList");
      container.innerHTML = `<h2>${currentTeam} — ${currentView} (${players.length} players)</h2>`;

      players.forEach((p, i) => {
        const avg = p.atBats ? (p.hits / p.atBats).toFixed(3) : ".000";
        const obp = (p.atBats + p.walks) ? ((p.hits + p.walks)/(p.atBats + p.walks)).toFixed(3) : ".000";
        const slg = p.atBats ? ((p.hits + p.homeRuns) / p.atBats).toFixed(3) : ".000";
        const kPct = p.atBats ? ((p.strikeouts / p.atBats) * 100).toFixed(1) + "%" : "—";
        const bbPct = p.atBats ? ((p.walks / p.atBats) * 100).toFixed(1) + "%" : "—";
        const bo = p.battingOrder ? `#${p.battingOrder}` : "—";

        const div = document.createElement("div");
        div.className = "player-card";
        div.innerHTML = `
          <div class="number">#${p.number}</div>
          <div style="flex:1">
            <strong style="font-size:1.45em;">${p.name}</strong><br>
            GP: ${p.gp} | AVG: <strong>${avg}</strong> | OBP: ${obp} | SLG: ${slg} | H: <strong>${p.hits}</strong><br>
            K%: ${kPct} | BB%: ${bbPct} | BO: <strong>${bo}</strong>
          </div>
        `;
        div.onclick = () => showProfile(i);
        container.appendChild(div);
      });
    }

    function showProfile(i) {
      const p = players[i];
      const avg = p.atBats ? (p.hits / p.atBats).toFixed(3) : ".000";
      const obp = (p.atBats + p.walks) ? ((p.hits + p.walks)/(p.atBats + p.walks)).toFixed(3) : ".000";
      const slg = p.atBats ? ((p.hits + p.homeRuns) / p.atBats).toFixed(3) : ".000";
      const ops = (parseFloat(obp) + parseFloat(slg)).toFixed(2);
      const kPct = p.atBats ? ((p.strikeouts / p.atBats) * 100).toFixed(1) + "%" : "—";
      const bbPct = p.atBats ? ((p.walks / p.atBats) * 100).toFixed(1) + "%" : "—";
      const era = p.inningsPitched > 0 ? (p.earnedRuns * 7 / p.inningsPitched).toFixed(2) : "—";

      let pitchingHTML = p.inningsPitched > 0 ? `
        <p><strong>IP:</strong> ${p.inningsPitched.toFixed(1)} | <strong>ERA:</strong> ${era} | <strong>WHIP:</strong> ${((p.hits + p.walks)/p.inningsPitched).toFixed(2)}</p>
      ` : "";

      document.getElementById("modalName").textContent = `#${p.number} ${p.name}`;
      document.getElementById("modalBody").innerHTML = `
        <p>GP: ${p.gp} | AVG: ${avg} | OBP: ${obp} | SLG: ${slg} | OPS: ${ops} | H: <strong>${p.hits}</strong> | BO: <strong>${p.battingOrder ? "#"+p.battingOrder : "—"}</strong></p>
        <p>HR: ${p.homeRuns} | RBI: ${p.rbis} | BB: ${p.walks} (${bbPct}) | SO: ${p.strikeouts} (${kPct})</p>
        ${pitchingHTML}
      `;

      document.getElementById("playerModal").style.display = "block";

      setTimeout(() => {
        const positions = [
          {name:"P", val:p.posP}, {name:"C", val:p.posC}, {name:"1B", val:p.pos1B},
          {name:"2B", val:p.pos2B}, {name:"3B", val:p.pos3B}, {name:"SS", val:p.posSS},
          {name:"LF", val:p.posLF}, {name:"CF", val:p.posCF}, {name:"RF", val:p.posRF}
        ];
        const totalPos = positions.reduce((a,b)=>a+b.val,0);
        const filteredPos = positions.filter(pos => pos.val > 0.5);

        if (posChart) posChart.destroy();
        posChart = new Chart(document.getElementById("posChart"), {
          type: 'pie',
          data: { labels: filteredPos.map(pos => pos.name),
            datasets: [{ data: filteredPos.map(pos => pos.val), backgroundColor: ['#22c55e','#3b82f6','#eab308','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#6366f1'] }]
          },
          options: {
            plugins: {
              datalabels: {
                formatter: (value) => totalPos > 0 ? Math.round((value / totalPos) * 100) + '%' : '',
                color: '#fff', font: { weight: 'bold', size: 16 }
              }
            }
          },
          plugins: [ChartDataLabels]
        });

        const singles = Math.max(0, p.hits - p.homeRuns);
        const otherOuts = Math.max(0, p.atBats - p.hits - p.strikeouts);
        const totalHitting = (p.homeRuns||0) + singles + (p.walks||0) + (p.strikeouts||0) + otherOuts;

        if (hittingChart) hittingChart.destroy();
        hittingChart = new Chart(document.getElementById("hittingChart"), {
          type: 'pie',
          data: {
            labels: ['HR', 'Singles', 'Walks', 'Strikeouts', 'Other Outs'],
            datasets: [{ data: [p.homeRuns||0, singles, p.walks||0, p.strikeouts||0, otherOuts], backgroundColor: ['#ef4444', '#eab308', '#3b82f6', '#f97316', '#64748b'] }]
          },
          options: {
            plugins: {
              datalabels: {
                formatter: (value) => totalHitting > 0 ? Math.round((value / totalHitting) * 100) + '%' : '',
                color: '#fff', font: { weight: 'bold', size: 16 }
              }
            }
          },
          plugins: [ChartDataLabels]
        });
      }, 300);
    }

    function closeModal() { 
      document.getElementById("playerModal").style.display = "none"; 
    }

    function switchTab(n) {
      document.getElementById("tabCards").classList.toggle("active", n === 0);
      document.getElementById("tabTable").classList.toggle("active", n === 1);
      document.getElementById("tabLineup").classList.toggle("active", n === 2);

      document.getElementById("playerList").style.display = n === 0 ? "block" : "none";
      document.getElementById("teamTableContainer").style.display = n === 1 ? "block" : "none";
      document.getElementById("lineupTrackerContainer").style.display = n === 2 ? "block" : "none";

      if (n === 1) renderTeamTable();
      if (n === 2) renderLineupTracker();
    }

    function renderTeamTable() {
      const container = document.getElementById("teamTableContainer");
      let html = `<h2>${currentTeam} — ${currentView} Team Stats Table</h2>`;
      html += `<table id="statsTable"><thead><tr>
        <th onclick="sortTable(0)">#</th>
        <th onclick="sortTable(1)">Player</th>
        <th onclick="sortTable(2)">GP</th>
        <th onclick="sortTable(3)">AVG</th>
        <th onclick="sortTable(4)">H</th>
        <th onclick="sortTable(5)">SLG</th>
        <th onclick="sortTable(6)">OBP</th>
        <th onclick="sortTable(7)">OPS</th>
        <th onclick="sortTable(8)">BO</th>
        <th onclick="sortTable(9)">HR</th>
        <th onclick="sortTable(10)">RBI</th>
        <th onclick="sortTable(11)">BB</th>
        <th onclick="sortTable(12)">BB%</th>
        <th onclick="sortTable(13)">SO</th>
        <th onclick="sortTable(14)">K%</th>
        <th onclick="sortTable(15)">IP</th>
        <th onclick="sortTable(16)">ERA</th>
        <th onclick="sortTable(17)">WHIP</th>
        <th onclick="sortTable(18)">P%</th>
        <th onclick="sortTable(19)">C%</th>
        <th onclick="sortTable(20)">1B%</th>
        <th onclick="sortTable(21)">2B%</th>
        <th onclick="sortTable(22)">3B%</th>
        <th onclick="sortTable(23)">SS%</th>
        <th onclick="sortTable(24)">LF%</th>
        <th onclick="sortTable(25)">CF%</th>
        <th onclick="sortTable(26)">RF%</th>
      </tr></thead><tbody>`;

      players.forEach(p => {
        const avg = p.atBats ? (p.hits / p.atBats).toFixed(3) : ".000";
        const slg = p.atBats ? ((p.hits + p.homeRuns) / p.atBats).toFixed(3) : ".000";
        const obp = (p.atBats + p.walks) ? ((p.hits + p.walks)/(p.atBats + p.walks)).toFixed(3) : ".000";
        const ops = (parseFloat(obp) + parseFloat(slg)).toFixed(2);
        const bbPct = p.atBats ? ((p.walks / p.atBats) * 100).toFixed(1) + "%" : "—";
        const kPct = p.atBats ? ((p.strikeouts / p.atBats) * 100).toFixed(1) + "%" : "—";
        const bo = p.battingOrder ? p.battingOrder : "—";
        const ip = p.inningsPitched ? p.inningsPitched.toFixed(1) : "—";
        const era = p.inningsPitched > 0 ? (p.earnedRuns * 7 / p.inningsPitched).toFixed(2) : "—";
        const whip = p.inningsPitched > 0 ? ((p.hits + p.walks)/p.inningsPitched).toFixed(2) : "—";
        const totalPos = (p.posP + p.posC + p.pos1B + p.pos2B + p.pos3B + p.posSS + p.posLF + p.posCF + p.posRF) || 1;

        html += `<tr>
          <td>#${p.number}</td><td>${p.name}</td><td>${p.gp}</td><td>${avg}</td><td>${p.hits}</td><td>${slg}</td><td>${obp}</td><td>${ops}</td><td>${bo}</td>
          <td>${p.homeRuns}</td><td>${p.rbis}</td><td>${p.walks}</td><td>${bbPct}</td><td>${p.strikeouts}</td><td>${kPct}</td>
          <td>${ip}</td><td>${era}</td><td>${whip}</td>
          <td>${Math.round(p.posP/totalPos*100)}%</td><td>${Math.round(p.posC/totalPos*100)}%</td>
          <td>${Math.round(p.pos1B/totalPos*100)}%</td><td>${Math.round(p.pos2B/totalPos*100)}%</td>
          <td>${Math.round(p.pos3B/totalPos*100)}%</td><td>${Math.round(p.posSS/totalPos*100)}%</td>
          <td>${Math.round(p.posLF/totalPos*100)}%</td><td>${Math.round(p.posCF/totalPos*100)}%</td>
          <td>${Math.round(p.posRF/totalPos*100)}%</td>
        </tr>`;
      });

      html += `</tbody></table>`;
      container.innerHTML = html;
    }

    function sortTable(colIndex) {
      if (currentSort.col === colIndex) {
        currentSort.dir *= -1;
      } else {
        currentSort.col = colIndex;
        currentSort.dir = 1;
      }

      const table = document.getElementById("statsTable");
      const tbody = table.tBodies[0];
      const rows = Array.from(tbody.rows);

      rows.sort((a, b) => {
        let valA = a.cells[colIndex].textContent.trim();
        let valB = b.cells[colIndex].textContent.trim();

        if (valA.includes('%')) valA = parseFloat(valA);
        if (valB.includes('%')) valB = parseFloat(valB);
        if (!isNaN(valA) && !isNaN(valB)) {
          return (valA - valB) * currentSort.dir;
        }
        return valA.localeCompare(valB) * currentSort.dir;
      });

      rows.forEach(row => tbody.appendChild(row));

      const headers = table.getElementsByTagName("th");
      for (let i = 0; i < headers.length; i++) {
        headers[i].classList.remove("sort-asc", "sort-desc");
        if (i === currentSort.col) {
          headers[i].classList.add(currentSort.dir === 1 ? "sort-asc" : "sort-desc");
        }
      }
    }

    function removeCurrentTeam() {
      if (!currentTeam || !confirm(`Delete team ${currentTeam}?`)) return;
      delete allTeams[currentTeam];
      currentTeam = Object.keys(allTeams)[0] || "";
      updateTeamSelector();
      saveData();
      if (currentTeam) loadCurrentView();
    }

    // ==================== IMPROVED LINEUP TRACKER ====================
    let lineupGames = [];

    function renderLineupTracker() {
      const container = document.getElementById("lineupTrackerContainer");
      let html = `<h2>Lineup Tracker - ${currentTeam}</h2>
        <button onclick="addNewLineupGame()" style="background:#22c55e;margin-bottom:15px;">+ Add Game Box Score Photo</button>`;

      if (lineupGames.length === 0) {
        html += `<p style="color:#94a3b8;">Upload box score photos. The app will try to read the lineup automatically.</p>`;
      } else {
        lineupGames.forEach((game, i) => {
          html += `
            <div class="lineup-game">
              <strong>${game.date} vs ${game.opponent}</strong><br>
              ${game.photo ? `<img src="${game.photo}" class="photo-preview">` : ''}
              <div class="ocr-result">${game.extractedText || 'No text extracted'}</div>
              <p><strong>Parsed Lineup:</strong> ${game.lineup && game.lineup.length ? game.lineup.join(" → ") : 'Not parsed yet'}</p>
              <button onclick="deleteLineupGame(${i})" style="background:#ef4444;">Delete Game</button>
            </div>`;
        });

        html += `<h3 style="margin-top:30px;">Batting Order Summary Across All Games</h3>`;
        html += generateLineupSummaryTable();
      }
      container.innerHTML = html;
    }

    function generateLineupSummaryTable() {
      let html = `<table><thead><tr><th>Spot</th><th>Player</th><th>Games</th><th>%</th></tr></thead><tbody>`;

      const spotStats = {};

      lineupGames.forEach(game => {
        if (game.lineup && game.lineup.length > 0) {
          game.lineup.forEach((player, index) => {
            const spot = (index + 1).toString();
            if (!spotStats[spot]) spotStats[spot] = {};
            if (!spotStats[spot][player]) spotStats[spot][player] = 0;
            spotStats[spot][player]++;
          });
        }
      });

      Object.keys(spotStats).sort((a,b) => Number(a) - Number(b)).forEach(spot => {
        const entries = Object.entries(spotStats[spot]).sort((a,b) => b[1] - a[1]);
        entries.forEach(([player, count]) => {
          const pct = (count / lineupGames.length * 100).toFixed(1);
          html += `<tr><td>${spot}</td><td>${player}</td><td>${count}</td><td>${pct}%</td></tr>`;
        });
      });

      html += `</tbody></table>`;
      return html;
    }

    async function addNewLineupGame() {
      const date = prompt("Game Date (YYYY-MM-DD):", new Date().toISOString().slice(0,10));
      const opponent = prompt("Opponent Name:", "");
      if (!date || !opponent) return;

      const fileInput = document.createElement("input");
      fileInput.type = "file";
      fileInput.accept = "image/*";
      fileInput.onchange = async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(ev) {
          const photoData = ev.target.result;

          alert("Processing photo with OCR...");

          try {
            const worker = await Tesseract.createWorker('eng');
            const result = await worker.recognize(photoData);
            await worker.terminate();

            const extracted = result.data.text.trim();

            // Improved parsing - look for player names with numbers
            let lineup = [];
            const lines = extracted.split('\n');
            for (let line of lines) {
              const match = line.match(/([A-Za-z\s]+)#?(\d+)/);
              if (match && match[1]) {
                const name = match[1].trim();
                if (name.length > 3) lineup.push(name);
              }
            }

            // Fallback: take first 9-10 names if parsing failed
            if (lineup.length < 5) {
              const nameMatches = extracted.match(/[A-Z][a-z]+ [A-Z][a-z]+/g) || [];
              lineup = nameMatches.slice(0, 9);
            }

            lineupGames.push({
              date: date,
              opponent: opponent,
              photo: photoData,
              extractedText: extracted,
              lineup: lineup
            });

            renderLineupTracker();
            alert("✅ Photo processed! Lineup extracted.");
          } catch(err) {
            alert("OCR failed, but photo was saved.");
            lineupGames.push({
              date: date,
              opponent: opponent,
              photo: photoData,
              extractedText: "OCR failed",
              lineup: []
            });
            renderLineupTracker();
          }
        };
        reader.readAsDataURL(file);
      };
      fileInput.click();
    }

    function deleteLineupGame(index) {
      if (confirm("Delete this game?")) {
        lineupGames.splice(index, 1);
        renderLineupTracker();
      }
    }
  </script>
</body>
</html>
